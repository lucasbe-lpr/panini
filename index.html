<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panini Tracker 2026</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="main-header">
        <div class="header-title">
            <h1>COUPE DU MONDE 2026 <span>TRACKER</span></h1>
        </div>
        <div class="data-actions">
            <button id="btn-export-json" class="btn btn-primary">Exporter ma collection (JSON)</button>
            <button id="btn-import-trigger" class="btn btn-secondary">Importer une collection</button>
            <input type="file" id="input-import-json" accept=".json" style="display: none;">
        </div>
    </header>

    <nav class="main-nav">
        <button class="nav-btn active" data-view="album">Album par page</button>
        <button class="nav-btn" data-view="country">Par pays</button>
        <button class="nav-btn" data-view="missing">Mes manquantes</button>
        <button class="nav-btn" data-view="duplicates">Mes doublons</button>
        <button class="nav-btn" data-view="stats">Statistiques</button>
    </nav>

    <main id="app-content">
        <div class="loader">Chargement de la base de données...</div>
    </main>

    <div id="text-export-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Export Texte</h2>
            <textarea id="text-export-area" rows="10" readonly></textarea>
            <button id="btn-close-modal" class="btn btn-primary">Fermer</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
