<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panini WC2026 — Ma Collection</title>

  <!-- Polices -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anybody:ital,wdth,wght@0,75..125,100..900;1,75..125,100..900&family=Hanken+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <!-- Icônes Material -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- EN-TÊTE GLOBAL -->
  <header class="app-header">
    <div class="header-wave" aria-hidden="true"></div>
    <div class="header-inner">
      <div class="header-brand">
        <div class="header-brand-text">
          <h1 class="brand-title">FWC 2026</h1>
          <span class="header-credit">Lucas Bessonnat v1.0</span>
        </div>
      </div>

      <div class="header-progress" id="headerProgress">
        <div class="progress-label">
          <span id="progressOwned">0</span> / <span id="progressTotal">980</span>
          <span class="progress-pct" id="progressPct">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>

      <div class="header-actions">
        <button class="btn btn-primary" id="fabBooster" title="Ouvrir un booster">
          <span class="material-symbols-outlined">stacks</span>
          <span class="btn-label">Booster</span>
        </button>
        <button class="btn btn-secondary" id="btnExport" title="Exporter ma collection">
          <span class="material-symbols-outlined">download</span>
          <span class="btn-label">Exporter</span>
        </button>
        <label class="btn btn-secondary" title="Importer une collection">
          <span class="material-symbols-outlined">upload</span>
          <span class="btn-label">Importer</span>
          <input type="file" accept=".json" id="inputImport" class="sr-only" />
        </label>
      </div>
    </div>
  </header>

  <!-- Reste du contenu HTML (identique à ton ancienne structure, mais stylisé avec les nouvelles couleurs CSS) -->
  <main class="app-main" id="appMain">
    <p style="padding: 2rem;"><i>(Le reste du contenu principal et des onglets "Album", "Manquantes", etc., va ici)</i></p>
  </main>
  
  <script src="app.js"></script>
</body>
</html>
