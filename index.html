<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panini WC26 – Ma collection</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Climate+Crisis&family=Hanken+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- HEADER -->
  <header id="header">
    <div class="logo-pill">
      <div class="logo-text">
        <span class="logo-source">Panini</span>
        <span class="logo-name">MONDIAL</span>
      </div>
      <div class="logo-digits" aria-hidden="true">
        <div class="digit-bubble d-dark">2</div>
        <div class="digit-bubble d-red">0</div>
        <div class="digit-bubble d-blue">2</div>
        <div class="digit-bubble d-green">6</div>
      </div>
    </div>
    <div class="badge-studio">Collection</div>
  </header>

  <!-- MAIN CONTENT -->
  <main id="app">
    <!-- Navigation par onglets -->
    <nav class="tabs" role="tablist">
      <button class="tab-btn active" data-tab="page">Album</button>
      <button class="tab-btn" data-tab="pays">Pays</button>
      <button class="tab-btn" data-tab="missing">Manquantes</button>
      <button class="tab-btn" data-tab="duplicates">Doublons</button>
      <button class="tab-btn" data-tab="stats">Stats</button>
      <button class="tab-btn" data-tab="trade">Échanges</button>
    </nav>

    <!-- Conteneurs des vues -->
    <section id="view-page" class="view active"></section>
    <section id="view-pays" class="view"></section>
    <section id="view-missing" class="view"></section>
    <section id="view-duplicates" class="view"></section>
    <section id="view-stats" class="view"></section>
    <section id="view-trade" class="view"></section>

    <!-- Barre d'outils globale (export/import) -->
    <div class="global-toolbar">
      <button class="btn btn-export" onclick="exportCollection()">📥 Exporter ma collection</button>
      <label class="btn btn-import" for="importFile">📤 Importer une collection</label>
      <input type="file" id="importFile" accept=".json" style="display:none;" />
      <span id="statusMsg" class="status-msg"></span>
    </div>
  </main>

  <!-- Modale pour les doublons (compteur) -->
  <div id="duplicateModal" class="modal hidden">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h3>Doublons pour <span id="dupStickerName"></span></h3>
      <div class="dup-control">
        <button id="dupDec">−</button>
        <span id="dupCount">0</span>
        <button id="dupInc">+</button>
      </div>
      <button id="dupConfirm" class="btn">Valider</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
