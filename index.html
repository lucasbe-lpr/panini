<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panini FIFA World Cup 2026 — Ma Collection</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Climate+Crisis&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ═══════════════════════════════════════════════
       EN-TÊTE PRINCIPAL (style Studio)
  ═══════════════════════════════════════════════ -->
  <header class="app-header">
    <div class="header-inner">
      <div class="logo-pill">
        <div class="logo-text">
          <span class="logo-source">Studio</span>
          <span class="logo-name">MONDIAL</span>
        </div>
        <div class="logo-digits" aria-hidden="true">
          <div class="digit-bubble d-dark">2</div>
          <div class="digit-bubble d-red">0</div>
          <div class="digit-bubble d-blue">2</div>
          <div class="digit-bubble d-green">6</div>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn btn-export" onclick="exportCollectionAsJSON()">↓ Exporter</button>
        <button class="btn btn-import" onclick="triggerImport()">↑ Importer</button>
        <input type="file" id="importFileInput" accept=".json" style="display:none" onchange="handleImportFile(event)" />
      </div>
    </div>
    <!-- Barre de progression globale -->
    <div class="header-progress">
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="globalProgressBar" style="width:0%"></div>
      </div>
      <span class="progress-label" id="globalProgressLabel">0 / 0 vignettes possédées (0%)</span>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════════
       NAVIGATION PAR ONGLETS
  ═══════════════════════════════════════════════ -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="album" onclick="switchTab('album')">📖 Album</button>
    <button class="tab-btn" data-tab="pays" onclick="switchTab('pays')">🌍 Par pays</button>
    <button class="tab-btn" data-tab="manquantes" onclick="switchTab('manquantes')">🔍 Manquantes</button>
    <button class="tab-btn" data-tab="doublons" onclick="switchTab('doublons')">♻️ Doublons</button>
    <button class="tab-btn" data-tab="stats" onclick="switchTab('stats')">📊 Stats</button>
  </nav>

  <!-- ═══════════════════════════════════════════════
       CONTENEUR PRINCIPAL
  ═══════════════════════════════════════════════ -->
  <main class="app-main">

    <!-- MESSAGE DE CHARGEMENT -->
    <div id="loadingMsg" class="loading-msg">
      <div class="loading-spinner"></div>
      <p>Chargement de la collection…</p>
    </div>

    <!-- MESSAGE D'ERREUR -->
    <div id="errorMsg" class="error-msg" style="display:none">
      <p id="errorText">Erreur de chargement.</p>
    </div>

    <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         VUE : ALBUM PAR PAGE
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
    <section id="tab-album" class="tab-panel active">
      <div class="album-nav">
        <button class="btn" id="prevPageBtn" onclick="albumPrevPage()">← Précédent</button>
        <div class="album-page-select">
          <label for="albumPageSelect">Page :</label>
          <select id="albumPageSelect" onchange="albumGoToPage(this.value)"></select>
        </div>
        <button class="btn" id="nextPageBtn" onclick="albumNextPage()">Suivant →</button>
      </div>
      <div class="album-page-header" id="albumPageHeader"></div>
      <div class="sticker-grid" id="albumGrid"></div>
    </section>

    <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         VUE : PAR PAYS
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
    <section id="tab-pays" class="tab-panel">
      <div class="filter-bar">
        <label for="paysSelect">Pays / Code :</label>
        <select id="paysSelect" onchange="renderPaysView()"></select>
      </div>
      <div class="pays-header" id="paysHeader"></div>
      <div class="sticker-grid" id="paysGrid"></div>
    </section>

    <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         VUE : MANQUANTES
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
    <section id="tab-manquantes" class="tab-panel">
      <div class="filter-bar">
        <select id="wantFilterCode" onchange="renderWantlist()"><option value="">Tous les pays</option></select>
        <select id="wantFilterSection" onchange="renderWantlist()"><option value="">Toutes sections</option></select>
        <select id="wantFilterType" onchange="renderWantlist()"><option value="">Tous types</option></select>
        <select id="wantFilterGroupe" onchange="renderWantlist()"><option value="">Tous groupes</option></select>
        <button class="btn btn-export-list" onclick="exportWantlistText()">📋 Copier liste texte</button>
      </div>
      <div class="list-count" id="wantCount"></div>
      <div class="sticker-grid" id="wantGrid"></div>
      <div class="export-textarea-wrap" id="wantTextareaWrap" style="display:none">
        <textarea id="wantTextarea" class="export-textarea" readonly></textarea>
        <button class="btn btn-copy" onclick="copyTextarea('wantTextarea')">📋 Copier</button>
      </div>
    </section>

    <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         VUE : DOUBLONS
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
    <section id="tab-doublons" class="tab-panel">
      <div class="filter-bar">
        <select id="dubFilterCode" onchange="renderDoublons()"><option value="">Tous les pays</option></select>
        <select id="dubFilterSection" onchange="renderDoublons()"><option value="">Toutes sections</option></select>
        <select id="dubFilterType" onchange="renderDoublons()"><option value="">Tous types</option></select>
        <select id="dubFilterGroupe" onchange="renderDoublons()"><option value="">Tous groupes</option></select>
        <button class="btn btn-export-list" onclick="exportDoublonsText()">📋 Copier liste texte</button>
      </div>
      <div class="list-count" id="dubCount"></div>
      <div class="sticker-grid" id="dubGrid"></div>
      <div class="export-textarea-wrap" id="dubTextareaWrap" style="display:none">
        <textarea id="dubTextarea" class="export-textarea" readonly></textarea>
        <button class="btn btn-copy" onclick="copyTextarea('dubTextarea')">📋 Copier</button>
      </div>
    </section>

    <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         VUE : STATS
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
    <section id="tab-stats" class="tab-panel">
      <div class="stats-grid" id="statsGrid"></div>
    </section>

  </main>

  <!-- ═══════════════════════════════════════════════
       TOAST
  ═══════════════════════════════════════════════ -->
  <div id="toast" class="toast" style="display:none"></div>

  <script src="app.js"></script>
</body>
</html>
