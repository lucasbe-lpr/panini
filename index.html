<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Album FWC 26 - Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
<body>

  <!-- Header Sticky -->
  <header class="header">
    <div class="header-content">
      <h1>Album FWC 26</h1>
      <nav>
        <button id="btnViewAlbum" class="btn active">Mon Album</button>
        <button id="btnViewTrades" class="btn">Échanges</button>
      </nav>
      
      <!-- Bannière de recherche -->
      <div class="search-results-banner">
        <input type="text" id="searchInput" placeholder="Rechercher un joueur ou un pays..." />
        <span class="material-symbols-outlined">search</span>
      </div>
    </div>
  </header>

  <main id="mainContent">
    <!-- Vue Album -->
    <section id="viewAlbum" class="view-section active">
      <h2>Ma Collection</h2>
      <div id="gridContainer" class="grid-container">
        <!-- Les cartes seront générées ici par JS -->
      </div>
    </section>

    <!-- Vue Échanges (Matchmaker) -->
    <section id="viewTrades" class="view-section hidden">
      <h2>Simulateur d'échanges</h2>
      <div class="trade-input-area">
        <label for="friendDataInput">Collez le code de sauvegarde de votre ami :</label>
        <textarea id="friendDataInput" rows="5" placeholder='{"FRA1": {"status": "duplicate", "count": 2} ...}'></textarea>
        <button id="btnRunMatchmaker" class="btn primary-btn">Lancer l'analyse</button>
      </div>

      <div id="matchmakerResults" class="hidden">
        <h3>Résultats de l'échange</h3>
        <div class="trade-summary">
          <div class="give-box">
            <h4>Je donne (<span id="giveCount">0</span>)</h4>
            <ul id="giveList"></ul>
          </div>
          <div class="receive-box">
            <h4>Je reçois (<span id="receiveCount">0</span>)</h4>
            <ul id="receiveList"></ul>
          </div>
        </div>
        
        <!-- NOUVEAU : Boutons d'action -->
        <div class="match-actions">
          <button id="btnValidateTrade" class="btn action-btn">
            <span class="material-symbols-outlined">handshake</span>
            Valider et appliquer l'échange
          </button>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
